# =============================================================================
# Camunda 8.7 — Helm values with Prometheus pod annotations for ADOT scraping
#
# Mirrors the 8.8 file in this repo, but adapted for the 8.7 chart layout:
#
#   * No `orchestration` umbrella — Zeebe, Zeebe Gateway, Operate, Tasklist
#     are separate top-level subcharts (this is the pre-8.8 structure).
#   * No `global.compatibility.orchestration` flag (8.8-only).
#   * gRPC ingress lives under `zeebe-gateway.ingress`, not under
#     `orchestration.ingress.grpc`.
#   * Identity auth has per-component redirectUrls (operate, tasklist,
#     optimize, webModeler), not a single `orchestration` redirect.
#   * Pod annotation paths are plain `/actuator/prometheus` — there is no
#     orchestration context-path prefix in 8.7.
#   * Service label values that the ADOT collector will see (Service):
#       zeebe, zeebe-gateway, operate, tasklist, optimize,
#       identity, connectors, web-modeler
#     (vs. `camunda-platform` for the unified orchestration pod in 8.8)
#
# Tested chart line: camunda/camunda-platform 12.x (Camunda 8.7).
# =============================================================================

global:
  ingress:
    enabled: true
    className: nginx
    host: "normunda.de"
    tls:
      enabled: true
      secretName: "tls-secret"
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/proxy-body-size: "20m"

  identity:
    auth:
      enabled: true
      publicIssuerUrl: "https://normunda.de/auth/realms/camunda-platform"
      # 8.7 hardcodes the per-component OIDC client-secret keys in the
      # Deployment templates. Each component's pod gets a secretKeyRef to:
      #
      #   operate    -> key `operate-secret`
      #   tasklist   -> key `tasklist-secret`
      #   optimize   -> key `optimize-secret`
      #   connectors -> key `connectors-secret`
      #   zeebe      -> key `zeebe-secret`
      #   webModeler -> key `webmodeler-secret`
      #
      # `existingSecretKey` here is silently ignored — it only takes effect
      # in 8.8+. So we just give the chart the secret name and make sure
      # `camunda-credentials` carries those exact keys.
      operate:
        redirectUrl: "https://normunda.de/operate"
        existingSecret:
          name: "camunda-credentials"
      tasklist:
        redirectUrl: "https://normunda.de/tasklist"
        existingSecret:
          name: "camunda-credentials"
      optimize:
        redirectUrl: "https://normunda.de/optimize"
        existingSecret:
          name: "camunda-credentials"
      webModeler:
        redirectUrl: "https://normunda.de/modeler"
        existingSecret:
          name: "camunda-credentials"
      connectors:
        existingSecret:
          name: "camunda-credentials"
      zeebe:
        existingSecret:
          name: "camunda-credentials"

# -----------------------------------------------------------------------------
# Zeebe broker (StatefulSet)
# Pod label app.kubernetes.io/name=zeebe -> Service="zeebe" in CloudWatch
# Management port 9600 exposes /actuator/prometheus
# -----------------------------------------------------------------------------
zeebe:
  enabled: true
  clusterSize: "3"
  partitionCount: "3"
  replicationFactor: "3"
  pvcSize: 10Gi
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9600"
    prometheus.io/path: "/actuator/prometheus"
  env:
    # Enable per-process/job execution metrics (off by default)
    - name: ZEEBE_BROKER_EXECUTION_METRICS_EXPORTER_ENABLED
      value: "true"

# -----------------------------------------------------------------------------
# Zeebe Gateway (Deployment)
# Pod label app.kubernetes.io/name=zeebe-gateway -> Service="zeebe-gateway"
# Owns the gRPC ingress in 8.7 (moved into orchestration.ingress.grpc in 8.8)
# -----------------------------------------------------------------------------
zeebe-gateway:
  enabled: true
  replicas: 2
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9600"
    prometheus.io/path: "/actuator/prometheus"
  ingress:
    enabled: true
    className: nginx
    host: "grpc.normunda.de"
    tls:
      enabled: true
      secretName: "tls-grpc-secret"
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      ingress.kubernetes.io/rewrite-target: "/"
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
      nginx.ingress.kubernetes.io/backend-protocol: "GRPC"
      nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"

# -----------------------------------------------------------------------------
# Operate
# Pod label app.kubernetes.io/name=operate -> Service="operate"
# Management port 9600 (separate from app port 80)
# -----------------------------------------------------------------------------
operate:
  enabled: true
  contextPath: "/operate"
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9600"
    prometheus.io/path: "/actuator/prometheus"

# -----------------------------------------------------------------------------
# Tasklist
# Pod label app.kubernetes.io/name=tasklist -> Service="tasklist"
# -----------------------------------------------------------------------------
tasklist:
  enabled: true
  contextPath: "/tasklist"
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9600"
    prometheus.io/path: "/actuator/prometheus"

# -----------------------------------------------------------------------------
# Optimize
# Pod label app.kubernetes.io/name=optimize -> Service="optimize"
# Optimize exposes its actuator on its own management port (8092 by default)
# -----------------------------------------------------------------------------
optimize:
  enabled: true
  contextPath: "/optimize"
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8092"
    prometheus.io/path: "/actuator/prometheus"

# -----------------------------------------------------------------------------
# Connectors (out-of-the-box connector runtime)
# Pod label app.kubernetes.io/name=connectors -> Service="connectors"
# Connectors actuator runs on the same port as the app: 8080
# -----------------------------------------------------------------------------
connectors:
  enabled: true
  contextPath: "/connectors"
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/actuator/prometheus"

# -----------------------------------------------------------------------------
# Identity
# Pod label app.kubernetes.io/name=identity -> Service="identity"
# 8.7 Identity exposes its actuator on management port 8082
# -----------------------------------------------------------------------------
identity:
  enabled: true
  contextPath: "/identity"
  fullURL: "https://normunda.de/identity"
  firstUser:
    existingSecret: "camunda-credentials"
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8082"
    prometheus.io/path: "/actuator/prometheus"

identityPostgresql:
  enabled: true
  auth:
    existingSecret: camunda-credentials
    secretKeys:
      adminPasswordKey: "identity-postgresql-admin-password"
      userPasswordKey: "identity-postgresql-user-password"

identityKeycloak:
  enabled: true
  auth:
    existingSecret: camunda-credentials
    passwordSecretKey: "identity-keycloak-admin-password"
  postgresql:
    auth:
      existingSecret: camunda-credentials
      secretKeys:
        adminPasswordKey: "identity-keycloak-postgresql-admin-password"
        userPasswordKey: "identity-keycloak-postgresql-user-password"

# -----------------------------------------------------------------------------
# Web Modeler — DISABLED in this demo setup.
#
# Web Modeler restapi requires real SMTP credentials (the placeholder
# `smtp.example.com` makes the pod CrashLoopBackOff at startup) and a
# Pusher app id/key/secret it loads from the auto-generated
# `camunda-web-modeler` and `camunda-web-modeler-restapi` Secrets — neither
# of which is satisfiable from `camunda-credentials` alone. Re-enable once
# you have real SMTP + Pusher credentials and provide them via:
#   webModeler.restapi.mail.{smtpHost,smtpPort,smtpUser,smtpPassword,fromAddress}
#   webModeler.restapi.externalPusher.{appId,key,secret}
# Pod label is app.kubernetes.io/name=web-modeler when re-enabled; metrics
# at :8091/metrics (not /actuator/prometheus).
# -----------------------------------------------------------------------------
webModeler:
  enabled: false

webModelerPostgresql:
  enabled: false

# -----------------------------------------------------------------------------
# Elasticsearch (single master for non-prod sizing)
# -----------------------------------------------------------------------------
elasticsearch:
  enabled: true
  master:
    replicaCount: 1

# We rely on pod-annotation scraping via the ADOT collector (CloudWatch path).
# Keep ServiceMonitors disabled to avoid double-collection if Prometheus is
# also installed.
prometheusServiceMonitor:
  enabled: false