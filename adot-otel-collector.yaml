---
# =============================================================================
# ADOT OpenTelemetry Collector — Camunda 8.8 on EKS
#
# Scrapes all Camunda pods + the collector itself, ships Prometheus metrics to
# CloudWatch as EMF. Metric allow-list is aligned to the official Camunda
# Grafana dashboards:
#   https://github.com/camunda/camunda/tree/main/monitor/grafana
#
# Dimensions emitted per metric group:
#   Partition-scoped metrics:     [Namespace, Service, partition]
#                                 [Namespace, Service]
#                                 [Namespace]
#   Non-partition-scoped metrics: [Namespace, Service]
#                                 [Namespace, Component]
#                                 [Namespace]
#
# NOTE: CloudWatch cannot compute percentiles from Prometheus _bucket
# counters. We still ship histograms (needed for _sum/_count averages) but
# latency widgets use _max series and averages rather than true p99.
# =============================================================================
apiVersion: opentelemetry.io/v1alpha1
kind: OpenTelemetryCollector
metadata:
  name: camunda-prometheus
  namespace: ${ADOT_NAMESPACE}
spec:
  mode: deployment
  serviceAccount: adot-collector

  # Expose the collector's own telemetry on :8888 so we can self-scrape it.
  config: |
    receivers:
      prometheus:
        config:
          global:
            scrape_interval: 30s
            scrape_timeout: 10s
          scrape_configs:

            # -----------------------------------------------------------------
            # All Camunda pods — driven entirely by pod annotations.
            #
            # Port reference from Helm values:
            #   orchestration  -> 9600  /orchestration/actuator/prometheus
            #   optimize       -> 8092  /optimize/actuator/prometheus
            #   connectors     -> 8080  /connectors/actuator/prometheus
            #   identity       -> 82    /identity/actuator/prometheus
            #   web-modeler    -> 8091  /metrics
            # -----------------------------------------------------------------
            - job_name: camunda-pods
              kubernetes_sd_configs:
                - role: pod
              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                  action: keep
                  regex: "true"
                - source_labels: [__meta_kubernetes_namespace]
                  action: keep
                  regex: camunda
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
                  action: replace
                  target_label: __metrics_path__
                  regex: (.+)
                - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
                  action: replace
                  regex: '([^:]+)(?::\d+)?;(\d+)'
                  replacement: $1:$2
                  target_label: __address__
                - source_labels: [__meta_kubernetes_namespace]
                  action: replace
                  target_label: Namespace
                - source_labels: [__meta_kubernetes_pod_name]
                  action: replace
                  target_label: PodName
                - source_labels: [__meta_kubernetes_pod_node_name]
                  action: replace
                  target_label: NodeName
                - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
                  action: replace
                  target_label: Service
                - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
                  action: replace
                  target_label: Component

            # -----------------------------------------------------------------
            # Service endpoints (headless services, external exporters)
            # -----------------------------------------------------------------
            - job_name: camunda-services
              kubernetes_sd_configs:
                - role: endpoints
              relabel_configs:
                - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
                  action: keep
                  regex: "true"
                - source_labels: [__meta_kubernetes_namespace]
                  action: keep
                  regex: camunda
                - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
                  action: replace
                  target_label: __metrics_path__
                  regex: (.+)
                - source_labels: [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
                  action: replace
                  regex: '([^:]+)(?::\d+)?;(\d+)'
                  replacement: $1:$2
                  target_label: __address__
                - source_labels: [__meta_kubernetes_namespace]
                  action: replace
                  target_label: Namespace
                - source_labels: [__meta_kubernetes_service_name]
                  action: replace
                  target_label: Service

            # -----------------------------------------------------------------
            # Collector self-monitoring
            # -----------------------------------------------------------------
            - job_name: otel-collector-self
              static_configs:
                - targets: ['localhost:8888']
              relabel_configs:
                - target_label: Namespace
                  replacement: ${ADOT_NAMESPACE}
                - target_label: Service
                  replacement: adot-collector
                - target_label: Component
                  replacement: collector

    processors:
      batch:
        timeout: 10s
        send_batch_size: 1000

    exporters:
      awsemf:
        region: ${AWS_REGION}
        namespace: ContainerInsights/Prometheus
        log_group_name: ${CW_LOG_GROUP_PROMETHEUS}
        log_stream_name: "{NodeName}"
        dimension_rollup_option: NoDimensionRollup
        resource_to_telemetry_conversion:
          enabled: true
        metric_declarations:

          # =================================================================
          # PARTITION-SCOPED METRICS
          # These carry a `partition` label (one or more per broker pod) and
          # benefit from per-partition drill-down in CloudWatch.
          # =================================================================

          # --- Health & cluster status ---
          - dimensions:
              - ["Namespace", "Service", "partition"]
              - ["Namespace", "Service"]
              - ["Namespace"]
            metric_name_selectors:
              - "^zeebe_health$"
              - "^zeebe_broker_health_nodes$"
              - "^zeebe_cluster_changes_status$"
              - "^zeebe_cluster_changes_operation_attempts_total$"
              - "^zeebe_cluster_changes_operations_completed$"
              - "^zeebe_cluster_changes_operations_pending$"
              - "^zeebe_banned_instances_count$"
              - "^zeebe_blacklisted_instances_total$"
              - "^zeebe_active_instances_count$"
              - "^zeebe_executed_instances_total$"

          # --- Stream processor (processing, replay, positions, state) ---
          - dimensions:
              - ["Namespace", "Service", "partition"]
              - ["Namespace", "Service"]
              - ["Namespace"]
            metric_name_selectors:
              - "^zeebe_stream_processor_.*$"
              - "^zeebe_replay_.*$"

          # --- Exporter (cluster exporter state + events) ---
          - dimensions:
              - ["Namespace", "Service", "partition"]
              - ["Namespace", "Service"]
              - ["Namespace"]
            metric_name_selectors:
              - "^zeebe_exporter_.*$"

          # --- Element / process-instance / job events ---
          # Emitted only when process instances are running.
          - dimensions:
              - ["Namespace", "Service", "partition"]
              - ["Namespace", "Service"]
              - ["Namespace"]
            metric_name_selectors:
              - "^zeebe_element_instance_events_total$"
              - "^zeebe_process_instance_events_total$"
              - "^zeebe_process_instance_execution_time.*$"
              - "^zeebe_job_events_total$"
              - "^zeebe_job_activation_time.*$"
              - "^zeebe_job_life_time.*$"
              - "^zeebe_job_execution_time.*$"
              - "^zeebe_task_execution_time.*$"
              - "^zeebe_incident_events_total$"
              - "^zeebe_pending_incidents_total$"

          # --- Backpressure & flow control ---
          - dimensions:
              - ["Namespace", "Service", "partition"]
              - ["Namespace", "Service"]
              - ["Namespace"]
            metric_name_selectors:
              - "^zeebe_backpressure_.*$"
              - "^zeebe_dropped_request_count_total$"
              - "^zeebe_received_request_count_total$"
              - "^zeebe_flow_control_.*$"
              - "^zeebe_deferred_append_count_total$"

          # --- Log appender & sequencer (logstream) ---
          - dimensions:
              - ["Namespace", "Service", "partition"]
              - ["Namespace", "Service"]
              - ["Namespace"]
            metric_name_selectors:
              - "^zeebe_log_appender_.*$"
              - "^zeebe_sequencer_.*$"

          # --- Snapshots ---
          - dimensions:
              - ["Namespace", "Service", "partition"]
              - ["Namespace", "Service"]
              - ["Namespace"]
            metric_name_selectors:
              - "^zeebe_snapshot_.*$"
              - "^atomix_snapshot_.*$"

          # --- Raft / Atomix (journal, role, append, heartbeat) ---
          - dimensions:
              - ["Namespace", "Service", "partition"]
              - ["Namespace", "Service"]
              - ["Namespace"]
            metric_name_selectors:
              - "^atomix_.*$"

          # --- Exporters: Elasticsearch, Camunda, RDBMS ---
          - dimensions:
              - ["Namespace", "Service", "partition"]
              - ["Namespace", "Service"]
              - ["Namespace"]
            metric_name_selectors:
              - "^zeebe_elasticsearch_exporter_.*$"
              - "^zeebe_camunda_exporter_.*$"
              - "^zeebe_rdbms_exporter_.*$"
              - "^zeebe_rdbms_table_row_count$"

          # --- RocksDB ---
          - dimensions:
              - ["Namespace", "Service", "partition"]
              - ["Namespace", "Service"]
              - ["Namespace"]
            metric_name_selectors:
              - "^zeebe_rocksdb_.*$"

          # --- Messaging (request/response between brokers) ---
          - dimensions:
              - ["Namespace", "Service", "partition"]
              - ["Namespace", "Service"]
              - ["Namespace"]
            metric_name_selectors:
              - "^zeebe_messaging_.*$"

          # --- Checkpoints & backups ---
          - dimensions:
              - ["Namespace", "Service", "partition"]
              - ["Namespace", "Service"]
              - ["Namespace"]
            metric_name_selectors:
              - "^zeebe_checkpoint_.*$"
              - "^zeebe_backup_.*$"
              - "^camunda_backup_retention_.*$"
              - "^camunda_checkpoint_scheduler_.*$"

          # --- Batch operations (Camunda 8.7+) ---
          - dimensions:
              - ["Namespace", "Service", "partition"]
              - ["Namespace", "Service"]
              - ["Namespace"]
            metric_name_selectors:
              - "^zeebe_batchoperations_.*$"

          # --- FEEL expression evaluation ---
          - dimensions:
              - ["Namespace", "Service", "partition"]
              - ["Namespace", "Service"]
              - ["Namespace"]
            metric_name_selectors:
              - "^zeebe_feel_expression_.*$"

          # --- Startup & leader transition timings ---
          - dimensions:
              - ["Namespace", "Service", "partition"]
              - ["Namespace", "Service"]
              - ["Namespace"]
            metric_name_selectors:
              - "^zeebe_leader_transition_latency$"
              - "^zeebe_buffered_messages_count$"

          # =================================================================
          # NON-PARTITION METRICS
          # JVM, OS, gateway, actor scheduler — one series per pod.
          # =================================================================

          # --- Gateway (request latency, failures, stream counts) ---
          - dimensions:
              - ["Namespace", "Service"]
              - ["Namespace", "Component"]
              - ["Namespace"]
            metric_name_selectors:
              - "^zeebe_gateway_.*$"
              - "^zeebe_broker_jobs_.*$"
              - "^zeebe_broker_open_job_stream_count$"
              - "^zeebe_client_worker_.*$"

          # --- gRPC server ---
          - dimensions:
              - ["Namespace", "Service"]
              - ["Namespace", "Component"]
              - ["Namespace"]
            metric_name_selectors:
              - "^grpc_server_.*$"

          # --- REST / HTTP server (Spring Boot actuator) ---
          - dimensions:
              - ["Namespace", "Service"]
              - ["Namespace", "Component"]
              - ["Namespace"]
            metric_name_selectors:
              - "^http_server_requests_.*$"

          # --- Actor scheduler ---
          - dimensions:
              - ["Namespace", "Service"]
              - ["Namespace", "Component"]
              - ["Namespace"]
            metric_name_selectors:
              - "^zeebe_actor_.*$"

          # --- SWIM cluster membership / DNS ---
          - dimensions:
              - ["Namespace", "Service"]
              - ["Namespace", "Component"]
              - ["Namespace"]
            metric_name_selectors:
              - "^zeebe_smp_.*$"
              - "^zeebe_dns_.*$"

          # --- JVM & system (heap, GC, CPU, threads) ---
          - dimensions:
              - ["Namespace", "Service"]
              - ["Namespace", "Component"]
              - ["Namespace"]
            metric_name_selectors:
              - "^jvm_.*$"
              - "^process_cpu_usage$"
              - "^process_cpu_seconds_total$"
              - "^process_open_fds$"
              - "^process_max_fds$"
              - "^process_files_.*$"
              - "^system_cpu_usage$"
              - "^system_load_average_1m$"
              - "^executor_.*$"
              - "^netty_.*$"
              - "^camunda_memory_nmt_.*$"

          # --- Camunda application metrics (Operate, Tasklist, Optimize) ---
          - dimensions:
              - ["Namespace", "Service"]
              - ["Namespace", "Component"]
              - ["Namespace"]
            metric_name_selectors:
              - "^camunda_.*$"

          # =================================================================
          # COLLECTOR SELF-MONITORING
          # Alert on scrape failures, dropped metrics, export errors.
          # =================================================================
          - dimensions:
              - ["Namespace", "Service"]
              - ["Namespace"]
            metric_name_selectors:
              - "^otelcol_receiver_.*$"
              - "^otelcol_processor_.*$"
              - "^otelcol_exporter_.*$"
              - "^otelcol_process_.*$"

    service:
      # ADOT Collector v0.46 uses the older telemetry schema.
      # `address:` is the newer OTel Collector syntax (>=v0.123) and causes
      # v0.46 to fail startup with: "'' has invalid keys: address".
      # Default self-metrics exposure on :8888 is implicit in v0.46.
      pipelines:
        metrics:
          receivers: [prometheus]
          processors: [batch]
          exporters: [awsemf]