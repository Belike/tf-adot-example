---
# =============================================================================
# ADOT OpenTelemetry Collector — Camunda 8.7 on EKS
#
# Scrapes all Camunda pods + the collector itself, ships Prometheus metrics to
# CloudWatch as EMF. Metric allow-list is aligned to the official Camunda
# Grafana dashboards: https://github.com/camunda/camunda/tree/main/monitor/grafana
#
# Pairs with the amazon-cloudwatch-observability EKS addon, which provides:
#   - FluentBit DaemonSet shipping pod stdout/stderr to CloudWatch Logs
#     (log group: /aws/containerinsights/<cluster>/application)
#   - Container Insights metrics (namespace ContainerInsights) for pod
#     restarts, CPU/memory utilization vs limits, etc.
# Those two pipelines complement this one — this collector handles the
# Camunda-specific Prometheus metrics only.
#
# Dimensions emitted per metric group:
#   Partition-scoped:     [Namespace, Service, partition]
#                         [Namespace, Service]
#                         [Namespace]
#   Non-partition:        [Namespace, Service]
#                         [Namespace, Component]
#                         [Namespace]
#   Plus dedicated overlay blocks where label-based filtering is needed:
#     atomix_role:        + [Namespace, Service, PodName, partition]
#                         + [Namespace, Service, PodName]
#     zeebe_backup_operations_total:
#                         + [Namespace, Service, partition, operation, result]
#                         + [Namespace, Service, operation, result]
#     executor_*:         [Namespace, Service, name] (in dedicated block)
#
# Service label values produced from the 8.7 Helm chart pod labels:
#   zeebe, zeebe-gateway, operate, tasklist, optimize, connectors, identity
#   (web-modeler emits at port 8091 path /metrics when enabled)
#
# 8.7-specific notes:
#   - Camunda Exporter is BETA in 8.7 (GA in 8.8). The legacy Elasticsearch
#     exporter is the default in 8.7. zeebe_camunda_exporter_* entries here
#     are forward-compatible but won't emit until that exporter is enabled.
#   - RDBMS exporter is ALPHA in 8.7. zeebe_rdbms_* entries are forward-only.
#   - Batch operations are EXPERIMENTAL in 8.7 under
#     zeebe.broker.experimental.engine.batchOperations.*. zeebe_batchoperations_*
#     metrics only appear when explicitly enabled.
#   - zeebe_process_instance_execution_time_* requires
#     ZEEBE_BROKER_EXECUTION_METRICS_EXPORTER_ENABLED=true on brokers in 8.7
#     (already set in the Helm values for this stack).
#   - In 8.7 Operate / Tasklist / Optimize emit metrics under their own
#     prefixes — the ^camunda_.*$ allowlist does NOT cover them. Dedicated
#     block below.
#
# CloudWatch CANNOT compute percentiles from Prometheus _bucket counters.
# Histograms are still shipped (needed for _sum/_count averages) but latency
# alarms must use _max series or compute averages via metric math.
# =============================================================================
apiVersion: opentelemetry.io/v1alpha1
kind: OpenTelemetryCollector
metadata:
  name: camunda-prometheus
  namespace: ${ADOT_NAMESPACE}
spec:
  mode: deployment
  serviceAccount: adot-collector

  # Expose the collector's own telemetry on :8888 so we can self-scrape it.
  config: |
    receivers:
      prometheus:
        config:
          global:
            scrape_interval: 30s
            scrape_timeout: 10s
          scrape_configs:

            # -----------------------------------------------------------------
            # All Camunda pods — driven entirely by pod annotations.
            #
            # Annotation values per 8.7 Helm values:
            #   zeebe          -> 9600 /actuator/prometheus
            #   zeebe-gateway  -> 9600 /actuator/prometheus
            #   operate        -> 9600 /actuator/prometheus
            #   tasklist       -> 9600 /actuator/prometheus
            #   optimize       -> 8092 /actuator/prometheus
            #   connectors     -> 8080 /actuator/prometheus
            #   identity       -> 8082 /actuator/prometheus
            #   web-modeler    -> 8091 /metrics  (when enabled)
            # -----------------------------------------------------------------
            - job_name: camunda-pods
              kubernetes_sd_configs:
                - role: pod
              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                  action: keep
                  regex: "true"
                - source_labels: [__meta_kubernetes_namespace]
                  action: keep
                  regex: camunda
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
                  action: replace
                  target_label: __metrics_path__
                  regex: (.+)
                - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
                  action: replace
                  regex: '([^:]+)(?::\d+)?;(\d+)'
                  replacement: $1:$2
                  target_label: __address__
                - source_labels: [__meta_kubernetes_namespace]
                  action: replace
                  target_label: Namespace
                - source_labels: [__meta_kubernetes_pod_name]
                  action: replace
                  target_label: PodName
                - source_labels: [__meta_kubernetes_pod_node_name]
                  action: replace
                  target_label: NodeName
                - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
                  action: replace
                  target_label: Service
                - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
                  action: replace
                  target_label: Component

            # -----------------------------------------------------------------
            # Service endpoints (headless services, external exporters)
            # -----------------------------------------------------------------
            - job_name: camunda-services
              kubernetes_sd_configs:
                - role: endpoints
              relabel_configs:
                - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
                  action: keep
                  regex: "true"
                - source_labels: [__meta_kubernetes_namespace]
                  action: keep
                  regex: camunda
                - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
                  action: replace
                  target_label: __metrics_path__
                  regex: (.+)
                - source_labels: [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
                  action: replace
                  regex: '([^:]+)(?::\d+)?;(\d+)'
                  replacement: $1:$2
                  target_label: __address__
                - source_labels: [__meta_kubernetes_namespace]
                  action: replace
                  target_label: Namespace
                - source_labels: [__meta_kubernetes_service_name]
                  action: replace
                  target_label: Service

            # -----------------------------------------------------------------
            # Collector self-monitoring
            # -----------------------------------------------------------------
            - job_name: otel-collector-self
              static_configs:
                - targets: ['localhost:8888']
              relabel_configs:
                - target_label: Namespace
                  replacement: ${ADOT_NAMESPACE}
                - target_label: Service
                  replacement: adot-collector
                - target_label: Component
                  replacement: collector

    processors:
      batch:
        timeout: 10s
        send_batch_size: 1000

    exporters:
      awsemf:
        region: ${AWS_REGION}
        namespace: ContainerInsights/Prometheus
        log_group_name: ${CW_LOG_GROUP_PROMETHEUS}
        log_stream_name: "{NodeName}"
        dimension_rollup_option: NoDimensionRollup
        resource_to_telemetry_conversion:
          enabled: true
        metric_declarations:

          # =================================================================
          # PARTITION-SCOPED METRICS
          # These carry a `partition` label (one or more per broker pod).
          # =================================================================

          # --- Health & cluster status ---
          - dimensions:
              - ["Namespace", "Service", "partition"]
              - ["Namespace", "Service"]
              - ["Namespace"]
            metric_name_selectors:
              - "^zeebe_health$"
              - "^zeebe_broker_health_nodes$"
              - "^zeebe_cluster_changes_status$"
              - "^zeebe_cluster_changes_operation_attempts_total$"
              - "^zeebe_cluster_changes_operations_completed$"
              - "^zeebe_cluster_changes_operations_pending$"
              - "^zeebe_banned_instances_count$"
              - "^zeebe_blacklisted_instances_total$"
              - "^zeebe_active_instances_count$"
              - "^zeebe_executed_instances_total$"

          # --- Stream processor (processing, replay, positions, state) ---
          - dimensions:
              - ["Namespace", "Service", "partition"]
              - ["Namespace", "Service"]
              - ["Namespace"]
            metric_name_selectors:
              - "^zeebe_stream_processor_.*$"
              - "^zeebe_replay_.*$"

          # --- Exporter (cluster exporter state + events) ---
          - dimensions:
              - ["Namespace", "Service", "partition"]
              - ["Namespace", "Service"]
              - ["Namespace"]
            metric_name_selectors:
              - "^zeebe_exporter_.*$"

          # --- Element / process-instance / job events ---
          # Emitted only when process instances are running.
          # NOTE: ^zeebe_process_instance_execution_time.*$ requires
          #   ZEEBE_BROKER_EXECUTION_METRICS_EXPORTER_ENABLED=true on brokers
          #   (already set in the matching 8.7 Helm values).
          - dimensions:
              - ["Namespace", "Service", "partition"]
              - ["Namespace", "Service"]
              - ["Namespace"]
            metric_name_selectors:
              - "^zeebe_element_instance_events_total$"
              - "^zeebe_process_instance_events_total$"
              - "^zeebe_process_instance_execution_time.*$"
              - "^zeebe_job_events_total$"
              - "^zeebe_job_activation_time.*$"
              - "^zeebe_job_life_time.*$"
              - "^zeebe_job_execution_time.*$"
              - "^zeebe_task_execution_time.*$"
              - "^zeebe_incident_events_total$"
              - "^zeebe_pending_incidents_total$"

          # --- Backpressure & flow control ---
          - dimensions:
              - ["Namespace", "Service", "partition"]
              - ["Namespace", "Service"]
              - ["Namespace"]
            metric_name_selectors:
              - "^zeebe_backpressure_.*$"
              - "^zeebe_dropped_request_count_total$"
              - "^zeebe_received_request_count_total$"
              - "^zeebe_flow_control_.*$"
              - "^zeebe_deferred_append_count_total$"

          # --- Log appender & sequencer (logstream) ---
          - dimensions:
              - ["Namespace", "Service", "partition"]
              - ["Namespace", "Service"]
              - ["Namespace"]
            metric_name_selectors:
              - "^zeebe_log_appender_.*$"
              - "^zeebe_sequencer_.*$"

          # --- Snapshots ---
          - dimensions:
              - ["Namespace", "Service", "partition"]
              - ["Namespace", "Service"]
              - ["Namespace"]
            metric_name_selectors:
              - "^zeebe_snapshot_.*$"
              - "^atomix_snapshot_.*$"

          # --- Raft / Atomix (general) ---
          - dimensions:
              - ["Namespace", "Service", "partition"]
              - ["Namespace", "Service"]
              - ["Namespace"]
            metric_name_selectors:
              - "^atomix_.*$"

          # --- atomix_role overlay: per-pod leader-spread alarming ---
          # Adds [Namespace, Service, PodName, partition] and
          # [Namespace, Service, PodName] dimension sets so the Unbalanced
          # Cluster alarm can compute leader counts per pod.
          # NOTE: atomix_role enum varies across versions. In current Zeebe
          # forks the value 3 typically means LEADER. Verify on your cluster
          # via `kubectl exec -n camunda zeebe-0 -- curl -s
          # localhost:9600/actuator/prometheus | grep '^atomix_role'` before
          # writing the alarm.
          - dimensions:
              - ["Namespace", "Service", "PodName", "partition"]
              - ["Namespace", "Service", "PodName"]
            metric_name_selectors:
              - "^atomix_role$"

          # --- Exporters: Elasticsearch, Camunda, RDBMS ---
          # 8.7 status:
          #   zeebe_elasticsearch_exporter_*: GA, default exporter in 8.7.
          #   zeebe_camunda_exporter_*:       BETA in 8.7 (GA in 8.8).
          #   zeebe_rdbms_exporter_*:         ALPHA in 8.7. Forward-only.
          - dimensions:
              - ["Namespace", "Service", "partition"]
              - ["Namespace", "Service"]
              - ["Namespace"]
            metric_name_selectors:
              - "^zeebe_elasticsearch_exporter_.*$"
              - "^zeebe_camunda_exporter_.*$"
              - "^zeebe_rdbms_exporter_.*$"
              - "^zeebe_rdbms_table_row_count$"

          # --- RocksDB ---
          - dimensions:
              - ["Namespace", "Service", "partition"]
              - ["Namespace", "Service"]
              - ["Namespace"]
            metric_name_selectors:
              - "^zeebe_rocksdb_.*$"

          # --- Messaging (request/response between brokers) ---
          - dimensions:
              - ["Namespace", "Service", "partition"]
              - ["Namespace", "Service"]
              - ["Namespace"]
            metric_name_selectors:
              - "^zeebe_messaging_.*$"

          # --- Checkpoints & backups (general) ---
          - dimensions:
              - ["Namespace", "Service", "partition"]
              - ["Namespace", "Service"]
              - ["Namespace"]
            metric_name_selectors:
              - "^zeebe_checkpoint_.*$"
              - "^zeebe_backup_.*$"
              - "^camunda_backup_retention_.*$"
              - "^camunda_checkpoint_scheduler_.*$"

          # --- zeebe_backup_operations_total overlay: carry operation+result ---
          # Required by the Backup Failed alarm so it can compare RATE of
          # failed vs completed status checks. Cardinality bounded:
          # ~3 operations × ~3 results × N partitions.
          - dimensions:
              - ["Namespace", "Service", "partition", "operation", "result"]
              - ["Namespace", "Service", "operation", "result"]
            metric_name_selectors:
              - "^zeebe_backup_operations_total$"

          # --- Batch operations ---
          # 8.7 status: EXPERIMENTAL. Only emitted when explicitly enabled via
          #   zeebe.broker.experimental.engine.batchOperations.* config path.
          - dimensions:
              - ["Namespace", "Service", "partition"]
              - ["Namespace", "Service"]
              - ["Namespace"]
            metric_name_selectors:
              - "^zeebe_batchoperations_.*$"

          # --- FEEL expression evaluation ---
          - dimensions:
              - ["Namespace", "Service", "partition"]
              - ["Namespace", "Service"]
              - ["Namespace"]
            metric_name_selectors:
              - "^zeebe_feel_expression_.*$"

          # --- Startup & leader transition timings ---
          - dimensions:
              - ["Namespace", "Service", "partition"]
              - ["Namespace", "Service"]
              - ["Namespace"]
            metric_name_selectors:
              - "^zeebe_leader_transition_latency$"
              - "^zeebe_buffered_messages_count$"

          # =================================================================
          # NON-PARTITION METRICS
          # JVM, OS, gateway, actor scheduler — one series per pod.
          # =================================================================

          # --- Gateway (request latency, failures, stream counts) ---
          # Service="zeebe-gateway"
          - dimensions:
              - ["Namespace", "Service"]
              - ["Namespace", "Component"]
              - ["Namespace"]
            metric_name_selectors:
              - "^zeebe_gateway_.*$"
              - "^zeebe_broker_jobs_.*$"
              - "^zeebe_broker_open_job_stream_count$"
              - "^zeebe_client_worker_.*$"

          # --- gRPC server ---
          # Service="zeebe-gateway" (broker doesn't expose gRPC server metrics)
          - dimensions:
              - ["Namespace", "Service"]
              - ["Namespace", "Component"]
              - ["Namespace"]
            metric_name_selectors:
              - "^grpc_server_.*$"

          # --- REST / HTTP server (Spring Boot actuator) ---
          # Emitted by every webapp: operate, tasklist, optimize, connectors, identity
          - dimensions:
              - ["Namespace", "Service"]
              - ["Namespace", "Component"]
              - ["Namespace"]
            metric_name_selectors:
              - "^http_server_requests_.*$"

          # --- Actor scheduler ---
          - dimensions:
              - ["Namespace", "Service"]
              - ["Namespace", "Component"]
              - ["Namespace"]
            metric_name_selectors:
              - "^zeebe_actor_.*$"

          # --- SWIM cluster membership / DNS ---
          - dimensions:
              - ["Namespace", "Service"]
              - ["Namespace", "Component"]
              - ["Namespace"]
            metric_name_selectors:
              - "^zeebe_smp_.*$"
              - "^zeebe_dns_.*$"

          # --- Executor thread pools ---
          # Required by the Job Worker / Connectors backlog alarms which
          # filter by name="zeebe_client_thread_pool". Without `name` as a
          # dimension all executor pools collapse into one series.
          - dimensions:
              - ["Namespace", "Service", "name"]
              - ["Namespace", "Service"]
              - ["Namespace"]
            metric_name_selectors:
              - "^executor_.*$"

          # --- JVM & system (heap, GC, CPU, threads) ---
          - dimensions:
              - ["Namespace", "Service"]
              - ["Namespace", "Component"]
              - ["Namespace"]
            metric_name_selectors:
              - "^jvm_.*$"
              - "^process_cpu_usage$"
              - "^process_cpu_seconds_total$"
              - "^process_open_fds$"
              - "^process_max_fds$"
              - "^process_files_.*$"
              - "^system_cpu_usage$"
              - "^system_load_average_1m$"
              - "^netty_.*$"
              - "^camunda_memory_nmt_.*$"

          # --- Camunda cross-cutting (backup retention, checkpoint scheduler, NMT) ---
          # In 8.7 the ^camunda_.*$ prefix is limited — does NOT include the
          # Operate/Tasklist/Optimize importer or app metrics, which use their
          # own prefixes (declared below).
          - dimensions:
              - ["Namespace", "Service"]
              - ["Namespace", "Component"]
              - ["Namespace"]
            metric_name_selectors:
              - "^camunda_.*$"

          # --- Operate / Tasklist / Optimize (8.7 importer + app metrics) ---
          # Required by the importer-lag alarms:
          #   operate_import_time_seconds_{sum,count}
          #   tasklist_import_time_seconds_{sum,count}
          #   optimize_import_overallImportTime_seconds_{sum,count}
          - dimensions:
              - ["Namespace", "Service"]
              - ["Namespace", "Component"]
              - ["Namespace"]
            metric_name_selectors:
              - "^operate_.*$"
              - "^tasklist_.*$"
              - "^optimize_.*$"

          # =================================================================
          # COLLECTOR SELF-MONITORING
          # Alert on scrape failures, dropped metrics, export errors.
          # =================================================================
          - dimensions:
              - ["Namespace", "Service"]
              - ["Namespace"]
            metric_name_selectors:
              - "^otelcol_receiver_.*$"
              - "^otelcol_processor_.*$"
              - "^otelcol_exporter_.*$"
              - "^otelcol_process_.*$"

    service:
      # ADOT Collector v0.46 uses the older telemetry schema.
      # `address:` is the newer OTel Collector syntax (>=v0.123) and causes
      # v0.46 to fail startup with: "'' has invalid keys: address".
      # Default self-metrics exposure on :8888 is implicit in v0.46.
      pipelines:
        metrics:
          receivers: [prometheus]
          processors: [batch]
          exporters: [awsemf]